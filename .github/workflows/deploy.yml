name: Nura Academy CI/CD & Maintenance

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *' # Setiap hari jam 00:00 UTC
  workflow_dispatch: # Memungkinkan trigger manual dari tab Actions

jobs:
  # Job untuk Deployment
  deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            cd /var/www/my-app
            
            # Pull latest changes
            git pull origin main
            
            # Install dependencies with Bun
            /home/nura/.bun/bin/bun install
            
            # Sync Prisma Schema
            /home/nura/.bun/bin/bun x prisma generate
            
            # Build the project
            /home/nura/.bun/bin/bun run build
            
            # Restart the Systemd service
            sudo systemctl restart nura

  # Job untuk Daily Cron
  hit-cron-endpoint:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Call Placement Reminder API
        run: |
          curl -X GET "https://nuraacademy.id/api/cron/placement-reminder?secret=${{ secrets.CRON_SECRET }}"
